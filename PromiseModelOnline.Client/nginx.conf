pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================
    # ✅ GZIP COMPRESSION
    # ============================
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_buffers 16 8k;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    gzip_disable "msie6";
    gzip_vary on;

    # ✅ Load server config(s)
    include /etc/nginx/conf.d/*.conf;
}