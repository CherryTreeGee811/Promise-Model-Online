<h1>Iteration History</h1>
<p id="error-text"></p>
<p id="loading-text">Loading iterations…</p>
<div id="iterations-list"></div>

<div id="iteration-detail" class="hidden">
    <h2 id="iteration-title"></h2>
    <div id="iteration-burndown-container">
        <h3>Iteration Burndown</h3>
        <canvas class="burndown-canvas" id="iteration-burndown-canvas" width="400" height="200"></canvas>
    </div>
    <h3>Strides</h3>
    <div id="stride-details"></div>
    <button id="back-to-iterations-btn" class="back-btn">← Back to iterations</button>
</div>
