<h1>Project Settings</h1>

<p id="error-text"></p>
<p id="loading-text">Loading project settings...</p>
<p id="success-text"></p>

<div class="project-settings-sections">
    <section class="detail-card">
        <h2>Edit Project</h2>
        <form id="project-settings-form">
            <label id="project-title-label" for="project-title-input">Title:</label>
            <input id="project-title-input" type="text" name="name" required maxlength="200" placeholder="Project title">

            <label id="project-description-label" for="project-description-input">Description:</label>
            <textarea id="project-description-input" name="description" maxlength="1000" placeholder="Project description"></textarea>

            <div class="field-actions">
                <button id="save-project-settings-btn" class="save-btn" type="submit">Save Changes</button>
                <a href="/projects" class="back-btn" id="cancel-project-settings-link">Back to projects</a>
            </div>
        </form>
    </section>

    <section class="detail-card">
        <h2>Project Summary</h2>
        <div id="project-summary-panel"></div>
    </section>

    <section class="detail-card">
        <h2>Export</h2>
        <p>Download a JSON snapshot of this project and its hierarchy.</p>
        <button id="export-project-btn" class="view-btn" type="button">Export JSON</button>
    </section>

    <section class="detail-card">
        <h2>Delete Project</h2>
        <p>This permanently deletes the project and everything under it. Type <strong id="project-delete-confirmation-text"></strong> to enable deletion.</p>
        <label id="project-delete-confirmation-label" for="project-delete-confirmation-input">Confirmation phrase:</label>
        <input id="project-delete-confirmation-input" type="text" placeholder="Type the confirmation phrase">
        <div class="field-actions">
            <button id="delete-project-btn" class="delete-btn" type="button" disabled>Delete Project</button>
        </div>
    </section>
</div>
