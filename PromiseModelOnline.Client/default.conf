server {
    listen       9000  ssl;
    listen  [::]:9000  ssl;
    server_name  localhost;

    ssl_certificate /etc/nginx/cert.pem;
    ssl_certificate_key /etc/nginx/key.pem;

    root   /app/wwwroot;
    index  index.html index.htm;

    # Security headers
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; script-src-elem 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src-elem 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self'; connect-src *;";
    add_header Content-Language "en-CA";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), bluetooth=(), payment=(), idle-detection=(), accelerometer=(),";

    # Routes that should serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }
}