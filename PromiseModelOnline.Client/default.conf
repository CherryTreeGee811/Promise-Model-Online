server {
    listen 9000 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/cert.pem;
    ssl_certificate_key /etc/nginx/key.pem;

    root /app/wwwroot;
    index index.html;

    # ============================
    # ✅ SPA ROUTING
    # ============================
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # ============================
    # ✅ STATIC ASSETS (CACHE)
    # ============================
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ============================
    # ✅ API → Gateway
    # ============================
    location /api/ {
        proxy_pass https://promisemodelonline.gateway:8010;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_ssl_verify off;
    }

    # ============================
    # ✅ AUTH (OIDC)
    # ============================
    location /connect/ {
        proxy_pass https://promisemodelonline.gateway:8010;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 9000;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_ssl_verify off;
    }

    # ============================
    # ✅ SIGNALR
    # ============================
    location /hubs/ {
        proxy_pass https://promisemodelonline.gateway:8010;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_ssl_verify off;
    }

    # ============================
    # ✅ HEALTH
    # ============================
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }

    # ============================
    # ✅ CSS
    # ============================
    location /css/ {
        proxy_pass https://promisemodelonline.gateway:8010;
        proxy_ssl_verify off;
    }


    # ============================
    # ✅ ISO
    # ============================
    location = /favicon.ico {
        root /app/wwwroot/images;
    }

    # ============================
    # ✅ SECURITY HEADERS
    # ============================
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self'; img-src 'self'; connect-src *;";
    add_header Content-Language "en-CA";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), idle-detection=(), accelerometer=()";
}
