services:
  promisemodelonline.client:
    image: ${DOCKER_REGISTRY-}promisemodelonlineclient
    container_name: promisemodelonlineclient
    hostname: localhost
    ports:
      - "9000:9000/tcp"
    depends_on:
      - promisemodelonline.api
    build:
      context: .
      dockerfile: PromiseModelOnline.Client/Dockerfile

  promisemodelonline.api:
    image: ${DOCKER_REGISTRY-}promisemodelonlineapi
    container_name: promisemodelonlineapi
    ports:
      - "8000:8000/tcp"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8000
      - ConnectionStrings__MSSQL=Server=sqlpreview,1433;Database=PromiseModelOnline;User Id=sa;Password=${DB_SA_PASSWORD:-SADevelopment10*};TrustServerCertificate=true;
    depends_on:
      promisemodelonline.auth:
        condition: service_started
      sqlpreview:
        condition: service_healthy
    networks:
      - promisemodelonline-net
    build:
      context: .
      dockerfile: PromiseModelOnline.Api/Dockerfile
    
  promisemodelonline.auth:
    image: ${DOCKER_REGISTRY-}promisemodelonlineauth
    container_name: promisemodelonlineauth
    ports:
      - "8060:8060/tcp"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8060
      - ConnectionStrings__MSSQL=Server=sqlpreview,1433;Database=PromiseModelOnline;User Id=sa;Password=${DB_SA_PASSWORD:-SADevelopment10*};TrustServerCertificate=true;
    depends_on:
      sqlpreview:
        condition: service_healthy
    networks:
      - promisemodelonline-net
    build:
      context: .
      dockerfile: PromiseModelOnline.Auth/Dockerfile

  sqlpreview:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlpreview
    networks:
      - promisemodelonline-net
    ports:
      - 1433:1433/tcp
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD:-SADevelopment10*}
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mssql-data:/var/opt/mssql

networks:
  promisemodelonline-net:
    driver: bridge

volumes:
  mssql-data:
    name: mssqldata
    driver: local
