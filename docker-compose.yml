services:
  promisemodelonline.client:
    image: ${DOCKER_REGISTRY-}promisemodelonlineclient
    container_name: promisemodelonlineclient
    ports:
      - "9000:9000/tcp"
    depends_on:
      - promisemodelonline.gateway
    networks:
      - promisemodelonline-net
    build:
      context: .
      dockerfile: PromiseModelOnline.Client/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  promisemodelonline.gateway:
    image: ${DOCKER_REGISTRY-}promisemodelonlinegateway
    container_name: promisemodelonlinegateway
    ports:
      - "8010:8010"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=https://+:8010
    depends_on:
      - promisemodelonline.api
      - promisemodelonline.auth
    networks:
      - promisemodelonline-net
    build:
      context: .
      dockerfile: PromiseModelOnline.Gateway/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8010"]
      interval: 15s
      timeout: 5s
      retries: 3

  promisemodelonline.api:
    image: ${DOCKER_REGISTRY-}promisemodelonlineapi
    container_name: promisemodelonlineapi
    ports:
      - "8000:8000/tcp"
    volumes:
      - ./run/secrets:/run/secrets:ro
    environment:
      - APP_BASE_URL=${APP_BASE_URL}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=https://+:8000
      - ConnectionStrings__MSSQL=Server=promisemodelonline.db,1433;Database=PromiseModelOnline;User Id=${PMO_API_DB_USER};Password_FILE=/run/secrets/db_api_password;TrustServerCertificate=true
    depends_on:
      promisemodelonline.auth:
        condition: service_healthy
      promisemodelonline.db-init:
        condition: service_completed_successfully
    networks:
      - promisemodelonline-net
    build:
      context: .
      dockerfile: PromiseModelOnline.Api/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  promisemodelonline.auth:
    image: ${DOCKER_REGISTRY-}promisemodelonlineauth
    container_name: promisemodelonlineauth
    ports:
      - "8060:8060/tcp"
    volumes:
      - ./PromiseModelOnline.Auth/cert.pfx:/app/cert.pfx:ro
      - ./run/secrets:/run/secrets:ro
    environment:
      - APP_BASE_URL=${APP_BASE_URL}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=https://+:8060
      - ConnectionStrings__MSSQL=Server=promisemodelonline.db,1433;Database=PromiseModelOnlineAuth;User Id=${PMO_AUTH_DB_USER};Password_FILE=/run/secrets/db_auth_password;TrustServerCertificate=true
      - Certificates__Password_FILE=/run/secrets/cert_password
    depends_on:
      promisemodelonline.db-init:
        condition: service_completed_successfully
    networks:
      - promisemodelonline-net
    build:
      context: .
      dockerfile: PromiseModelOnline.Auth/Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8060/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  promisemodelonline.db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: promisemodelonlinedb
    networks:
      - promisemodelonline-net
    ports:
      - 1433:1433/tcp
    volumes:
      - ./run/secrets:/run/secrets:ro
      - mssql-data:/var/opt/mssql
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD_FILE: /run/secrets/db_sa_password

  promisemodelonline.db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: promisemodelonlinedbinit
    depends_on:
      - promisemodelonline.db
    networks:
      - promisemodelonline-net
    volumes:
      - ./run/secrets:/run/secrets:ro
      - ./db/init/run-init.sh:/init/run-init.sh:ro
    environment:
      PMO_API_DB_USER: ${PMO_API_DB_USER}
      PMO_AUTH_DB_USER: ${PMO_AUTH_DB_USER}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        tr -d '\r' < /init/run-init.sh > /tmp/run-init.lf
        /bin/sh /tmp/run-init.lf
    restart: "no"

networks:
  promisemodelonline-net:
    driver: bridge

volumes:
  mssql-data:
    name: mssqldata
    driver: local