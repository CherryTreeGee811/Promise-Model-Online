name: PromiseModelOnline
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:
jobs:
  BuildAndTest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
              
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      
      - name: Add Client CI TLS/SSL CERT & KEY
        shell: bash
        run: |
          mkdir -p PromiseModelOnline.Client
          cat > PromiseModelOnline.Client/cert.pem <<'PEM'
          ${{ vars.CLIENT_CI_CERT }}
          PEM
          cat > PromiseModelOnline.Client/key.pem <<'PEM'
          ${{ secrets.CLIENT_CI_KEY }}
          PEM
      
      - name: Add API CI TLS/SSL CERT & KEY
        shell: bash
        run: |
          mkdir -p PromiseModelOnline.API
          cat > PromiseModelOnline.API/cert.pem <<'PEM'
          ${{ vars.API_CI_CERT }}
          PEM
          cat > PromiseModelOnline.APIEOF' > PromiseModelOnline.API/cert.pem
          ${{ vars.API_CI_CERT }}
          EOF
              cat <<'EOF' > PromiseModelOnline.API/key.pem
          ${{ secrets.API_CI_KEY }}
          EOF
          
      - name: Add AUTH CI TLS/SSL CERT & KEY
        shell: bash
        run: |
          mkdir -p PromiseModelOnline.AUTH
          cat <<'EOF' > PromiseModelOnline.AUTH/cert.pem
          ${{ vars.AUTH_CI_CERT }}
          EOF
              cat <<'EOF' > PromiseModelOnline.AUTH/key.pem
          ${{ secrets.AUTH_CI_KEY }}
          EOF
      
      - name: Build and Run App Containers
        shell: bash
        run: docker compose up -d

      - name: Push Docker Images to DockerHub
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          docker tag promisemodelonlineapi cherrytree811/promisemodelonlineapi:latest
          docker tag promisemodelonlineclient cherrytree811/promisemodelonlineclient:latest
          docker tag promisemodelonlineauth cherrytree811/promisemodelonlineauth:latest
          docker login -u cherrytree811 -p ${{ secrets.DOCKER_CRED }}
          docker push cherrytree811/promisemodelonlineapi:latest
          docker push cherrytree811/promisemodelonlineclient:latest
          docker push cherrytree811/promisemodelonlineauth:latest
