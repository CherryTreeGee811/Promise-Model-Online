name: PromiseModelOnline
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:
jobs:
  BuildAndTest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
              
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      
      - name: Add Client CI TLS/SSL CERT & KEY
        shell: bash
        run: |
          mkdir -p PromiseModelOnline.Client
          cat > PromiseModelOnline.Client/cert.pem <<'PEM'
          ${{ vars.CLIENT_CI_CERT }}
          PEM
          cat > PromiseModelOnline.Client/key.pem <<'PEM'
          ${{ secrets.CLIENT_CI_KEY }}
          PEM
      
      - name: Add API CI TLS/SSL CERT & KEY
        shell: bash
        run: |
          mkdir -p PromiseModelOnline.Api
          cat > PromiseModelOnline.Api/cert.pem <<'PEM'
          ${{ vars.API_CI_CERT }}
          PEM
          cat > PromiseModelOnline.Api/key.pem <<'PEM'
          ${{ secrets.API_CI_KEY }}
          PEM
          
      - name: Add AUTH CI TLS/SSL CERT & KEY
        shell: bash
        run: |
          mkdir -p PromiseModelOnline.Auth
          cat > PromiseModelOnline.Auth/cert.pem <<'PEM'
          ${{ vars.AUTH_CI_CERT }}
          PEM
          cat > PromiseModelOnline.Auth/key.pem <<'PEM'
          ${{ secrets.AUTH_CI_KEY }}
          PEM

      - name: Build Containers
        shell: bash
        run: docker compose build
      
      - name: Smoke Test Production Environment
        shell: bash
        run: |
          docker compose up -d
          
          # ---- Wait for db-init to finish ----
          echo "Waiting for db-init to complete..."
          for i in $(seq 1 10); do
            STATUS=$(docker inspect promisemodelonlinedbinit --format='{{.State.ExitCode}}')
            if [ "$STATUS" -eq 0 ]; then
              echo "db-init completed successfully"
              break
            fi
            echo "db-init not finished yet (attempt $i)..."
            sleep 5
          done
          if [ "$STATUS" != "0" ]; then
            echo "ERROR: db-init did not exit successfully (exit code $STATUS)"
            exit 1
          fi
          
          # ---- SQL Server ----
          echo "Waiting for SQL Server..."
          SQL_READY=false
          for i in $(seq 1 20); do
            if docker exec promisemodelonlinedb /opt/mssql-tools/bin/sqlcmd -U "${{ secrets.PMO_API_DB_USER }}" -P "${{ secrets.PMO_API_DB_PASSWORD }}" -Q "SELECT 1" &>/dev/null; then
              echo "SQL Server is ready"
              SQL_READY=true
              break
            fi
            echo "SQL Server not ready yet, waiting..."
            sleep 3
          done
          if [ "$SQL_READY" = false ]; then
            echo "ERROR: SQL Server failed to become ready within 60 seconds"
            exit 1
          fi

          # ---- Auth ----
          echo "Waiting for Auth..."
          AUTH_READY=false
          for i in $(seq 1 20); do
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:8060/health)
            if [ "$STATUS" -eq 200 ]; then
              BODY=$(curl -k -s https://localhost:8060/health)
              if echo "$BODY" | grep -q '"healthy"'; then
                echo "Auth is healthy"
                AUTH_READY=true
                break
              fi
            fi
            echo "Attempt $i: Auth not ready yet, waiting..."
            sleep 3
          done
          if [ "$AUTH_READY" = false ]; then
            echo "ERROR: Auth failed to become healthy within 60 seconds"
            exit 1
          fi

          # ---- API ----
          echo "Waiting for API..."
          API_READY=false
          for i in $(seq 1 30); do
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:8000/health)
            if [ "$STATUS" -eq 200 ]; then
              BODY=$(curl -k -s https://localhost:8000/health)
              if echo "$BODY" | grep -q '"healthy"'; then
                echo "API is healthy"
                API_READY=true
                break
              fi
            fi
            echo "Attempt $i: API not ready yet, waiting..."
            sleep 3
          done
          if [ "$API_READY" = false ]; then
            echo "ERROR: API failed to become healthy within 90 seconds"
            exit 1
          fi

          # ---- Client (Nginx) ----
          echo "Waiting for Client..."
          CLIENT_READY=false
          for i in $(seq 1 10); do
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:9000/health)
            if [ "$STATUS" -eq 200 ]; then
              BODY=$(curl -k -s https://localhost:9000/health)
              if echo "$BODY" | grep -q '"healthy"'; then
                echo "Client is healthy"
                CLIENT_READY=true
                break
              fi
            fi
            echo "Client not ready (attempt $i)..."
            sleep 3
          done
          if [ "$CLIENT_READY" = false ]; then
            echo "ERROR: Client failed to become healthy within 30 seconds"
            exit 1
          fi

          echo "All production services are healthy!"

      - name: Tear Down Production Services
        if: always()
        shell: bash
        run: docker compose down -v

      - name: Run Auth Tests
        shell: bash
        run: |
          mkdir -p AuthTestResults
          dotnet test ./PromiseModelOnline.Auth.Tests/PromiseModelOnline.Auth.Tests.csproj \
            --collect:"XPlat Code Coverage" \
            --results-directory ./AuthTestResults \
            --os linux \
            --logger "console;verbosity=normal"

      - name: Run API Tests
        shell: bash
        run: |
          mkdir -p ApiTestResults
          dotnet test ./PromiseModelOnline.Api.Tests/PromiseModelOnline.Api.Tests.csproj \
            --collect:"XPlat Code Coverage" \
            --results-directory ./ApiTestResults \
            --os linux \
            --logger "console;verbosity=normal"
    
      - name: Run Client UI Test Environment
        shell: bash
        run: docker compose -f infrastructure/tests/docker-compose.ui.yml up --build -d

      - name: Smoke Test Client UI Test Environment
        shell: bash
        run: |
          echo "Waiting for WireMock..."
          WIREMOCK_READY=false
          for i in $(seq 1 10); do
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:8000/health)
            if [ "$STATUS" -eq 200 ]; then
              BODY=$(curl -k -s https://localhost:8000/health)
              if echo "$BODY" | grep -q '"healthy"'; then
                echo "WireMock is healthy"
                WIREMOCK_READY=true
                break
              fi
            fi
            echo "WireMock not ready (attempt $i)..."
            sleep 2
          done
          if [ "$WIREMOCK_READY" = false ]; then
            echo "ERROR: WireMock failed to become healthy within 20 seconds"
            exit 1
          fi

          echo "Waiting for Client (Nginx)..."
          CLIENT_READY=false
          for i in $(seq 1 10); do
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:9000/health)
            if [ "$STATUS" -eq 200 ]; then
              BODY=$(curl -k -s https://localhost:9000/health)
              if echo "$BODY" | grep -q '"healthy"'; then
                echo "Client is healthy"
                CLIENT_READY=true
                break
              fi
            fi
            echo "Client not ready (attempt $i)..."
            sleep 2
          done
          if [ "$CLIENT_READY" = false ]; then
            echo "ERROR: Client failed to become healthy within 20 seconds"
            exit 1
          fi
          
      - name: Run Client Tests
        shell: bash
        run: |
          mkdir -p ClientTestResults
          dotnet test ./PromiseModelOnline.Client.Tests/PromiseModelOnline.Client.Tests.csproj \
            --collect:"XPlat Code Coverage" \
            --results-directory ./ClientTestResults \
            --os linux \
            --logger "console;verbosity=normal"

      - name: Teardown Client UI Test Environment
        if: always()
        shell: bash
        run: docker compose -f infrastructure/tests/docker-compose.ui.yml down --remove-orphans -v

      - name: Push Docker Images to DockerHub
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          docker tag promisemodelonlineapi cherrytree811/promisemodelonlineapi:latest
          docker tag promisemodelonlineclient cherrytree811/promisemodelonlineclient:latest
          docker tag promisemodelonlineauth cherrytree811/promisemodelonlineauth:latest
          docker login -u cherrytree811 -p ${{ secrets.DOCKER_CRED }}
          docker push cherrytree811/promisemodelonlineapi:latest
          docker push cherrytree811/promisemodelonlineclient:latest
          docker push cherrytree811/promisemodelonlineauth:latest
